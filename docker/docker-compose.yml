version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: oa-db
    environment:
      POSTGRES_DB: oa_system
      POSTGRES_USER: oa_user
      POSTGRES_PASSWORD: oa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oa_user -d oa_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: oa-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: oa_system
      DB_USER: oa_user
      DB_PASSWORD: oa_password
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm run build && npm start"

  frontend:
    build: ./frontend
    container_name: oa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: