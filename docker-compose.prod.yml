version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: oa-db
    environment:
      POSTGRES_DB: oa_system
      POSTGRES_USER: oa_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oa_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oa_user -d oa_system"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - oa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oa-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: oa_system
      DB_USER: oa_user
      DB_PASSWORD: ${DB_PASSWORD:-oa_password}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://oa.yourdomain.com}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - oa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oa-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - oa-network

  nginx:
    image: nginx:alpine
    container_name: oa-nginx
    ports:
      - "80:80"
      # 如需源站直接处理 HTTPS，取消下面注释并配置 SSL 证书
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - oa-network

volumes:
  postgres_data:

networks:
  oa-network:
    driver: bridge
